name: Resenha Diária Sync

on:
  schedule:
    # Run every day at 06:00 AM UTC (03:00 AM BRT)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  sync-legislation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @google/genai rss-parser

      - name: Run Sync Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/sync-resenha.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/resenhaUpdates.json
          
          # Check if there are changes before committing
          if git diff --staged --quiet; then
            echo "No new legislation today."
          else
            git commit -m "chore: daily resenha update via AI scraper"
            git push origin main
          fi
